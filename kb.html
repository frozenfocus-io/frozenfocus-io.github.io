<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base — lab.notes</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#07090a;--bg-raised:#0d1114;--bg-card:#101518;--border:#1c2830;--border-hi:#2a404e;--accent:#29e07f;--accent-dim:#1a6e43;--amber:#f0a843;--red:#e05a5a;--red-dim:#5a1a1a;--text:#dde8e2;--text-mid:#7a9e8e;--text-dim:#3a5548;--scan:rgba(0,255,120,0.015);--font-mono:'JetBrains Mono',monospace;--font-dis:'Syne',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.7;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);pointer-events:none;z-index:100}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}
    nav{position:sticky;top:0;z-index:50;background:rgba(7,9,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
    .nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
    .nav-logo{font-family:var(--font-dis);font-weight:800;font-size:17px;letter-spacing:-.5px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:8px}
    .nav-logo span{color:var(--text-mid);font-weight:400;font-size:13px;font-family:var(--font-mono)}
    .nav-links{display:flex;gap:2px;list-style:none}
    .nav-links a{color:var(--text-mid);text-decoration:none;padding:6px 14px;border-radius:4px;font-size:12px;transition:color .2s,background .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(41,224,127,.07)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .auth-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
    .auth-btn.logged-in{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .auth-user{font-size:11px;color:var(--text-mid);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .kb-layout{position:relative;z-index:1;display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}
    .kb-sidebar{border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column}
    .sidebar-header{padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
    .sidebar-title{font-family:var(--font-dis);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
    .sidebar-sub{font-size:11px;color:var(--text-dim)}
    .cat-list{list-style:none;flex:1;overflow-y:auto;padding:4px 8px}
    .cat-item{border-radius:5px;margin-bottom:2px;display:flex;align-items:center;padding-right:4px}
    .cat-item:hover{background:rgba(255,255,255,.02)}
    .cat-btn{flex:1;background:transparent;border:none;color:var(--text-mid);cursor:pointer;padding:9px 10px;display:flex;align-items:center;gap:10px;border-radius:5px;font-family:var(--font-mono);font-size:12px;text-align:left;transition:color .15s}
    .cat-btn:hover{color:var(--text)}
    .cat-btn.active{color:var(--accent);background:rgba(41,224,127,.07)}
    .cat-icon{font-size:15px;flex-shrink:0}
    .cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cat-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}

  </style>

<script>
const KB_BASE = 'content/Knowledge-Base';
const ICONS = ['📝','💡','⚡','🔌','📐','🛠️','🔬','🧪','🔋','🎛️','📡','🤖','📦','⚙️','🔧','📊','🗂️','🖥️','📋','🧮'];

// ── LAB API ──
const LabAPI = (() => {
  let _user=null,_isOwner=false,_perms={};
  async function init(cb){
    if(typeof netlifyIdentity==='undefined'){cb(null);return;}
    netlifyIdentity.on('login',async u=>{netlifyIdentity.close();_user=u;await _me();setTimeout(async()=>{await _me();cb(_user);},600);});
    netlifyIdentity.on('logout',()=>{_user=null;_isOwner=false;_perms={};cb(null);});
    netlifyIdentity.on('init',async u=>{_user=u;if(u)await _me();cb(_user);});
    netlifyIdentity.init();
  }
  async function _me(){try{const r=await _r('/.netlify/functions/api?action=me');if(r.ok){const d=await r.json();_isOwner=d.isOwner;_perms=d.permissions||{};}}catch(e){}}
  function _r(url,opts={}){const t=_user?.token?.access_token;return fetch(url,{...opts,headers:{'Content-Type':'application/json',...(t?{'Authorization':`Bearer ${t}`}:{}),... (opts.headers||{})}});}
  async function list(p){const r=await _r(`/.netlify/functions/api?action=list&path=${encodeURIComponent(p)}`);return r.ok?(await r.json()).items:[];}
  async function listfiles(p){const r=await _r(`/.netlify/functions/api?action=listfiles&path=${encodeURIComponent(p)}`);return r.ok?(await r.json()).items:[];}
  async function readfile(p){const r=await _r(`/.netlify/functions/api?action=readfile&path=${encodeURIComponent(p)}`);return r.ok?await r.json():{content:null,sha:null};}
  async function writefile(p,content,sha){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'writefile',path:p,content,sha})});return r.ok?await r.json():false;}
  async function deletefile(p,sha){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'deletefile',path:p,sha})});return r.ok;}
  async function createfolder(p){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'createfolder',path:p})});return r.ok;}
  async function deletefolder(p){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'deletefolder',path:p})});return r.ok;}
  async function readProjects(){try{const r=await _r('/.netlify/functions/api?key=projects');if(r.ok){const{data}=await r.json();if(data)return data;}}catch(e){}const c=localStorage.getItem('cache-projects')||localStorage.getItem('lab-projects');return c?JSON.parse(c):[];}
  function isOwner(){return _isOwner;}
  function getUser(){return _user;}
  function login(){netlifyIdentity.open('login');}
  function logout(){netlifyIdentity.logout();}
  return{init,list,listfiles,readfile,writefile,deletefile,createfolder,deletefolder,readProjects,isOwner,getUser,login,logout};
})();

// ── FRONTMATTER ──
function parseFM(raw){
  if(!raw||!raw.startsWith('---'))return{meta:{},content:raw||''};
  const end=raw.indexOf('\n---',3);if(end===-1)return{meta:{},content:raw};
  const yaml=raw.slice(4,end);const content=raw.slice(end+4).trimStart();
  const meta={};
  yaml.split('\n').forEach(line=>{
    const c=line.indexOf(':');if(c===-1)return;
    const k=line.slice(0,c).trim();const v=line.slice(c+1).trim();
    if(v.startsWith('[')&&v.endsWith(']'))meta[k]=v.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);
    else meta[k]=v;
  });
  return{meta,content};
}

function serializeFM(meta,content){
  const lines=['---'];
  for(const[k,v]of Object.entries(meta)){
    if(Array.isArray(v))lines.push(`${k}: [${v.join(', ')}]`);
    else lines.push(`${k}: ${v}`);
  }
  lines.push('---','',content||'');
  return lines.join('\n');
}

function titleToFile(t){return t.trim().replace(/[^\w\säöüÄÖÜß\-]/g,'').replace(/\s+/g,'-')+'.md';}
function fileToTitle(f){return f.replace(/\.md$/,'').replace(/-/g,' ');}

// ── STATE ──
let categories=[],activeCategory=null,notes=[],editingNoteFile=null,editingCatName=null,selectedIcon='📝',selectedProjectIds=[],viewingNote=null,pendingConfirm=null;

// ── AUTH ──
function updateAuthUI(user){
  const btn=document.getElementById('auth-btn');const disp=document.getElementById('auth-user-display');
  if(user){btn.textContent='Logout';btn.className='auth-btn logged-in';disp.textContent=user.email;}
  else{btn.textContent='Login';btn.className='auth-btn';disp.textContent='';}
  const e=LabAPI.isOwner();
  document.getElementById('add-cat-btn').style.display=e?'':'none';
  const veb=document.getElementById('view-edit-btn');if(veb)veb.style.display=e?'':'none';
  renderSidebar();
}
function authAction(){if(LabAPI.getUser())LabAPI.logout();else LabAPI.login();}

// ── INIT ──
async function initKB(){
  document.getElementById('kb-main').innerHTML='<div class="loading"><div class="spin"></div> Lade Knowledge Base...</div>';
  const folders=await LabAPI.list('Knowledge-Base');
  categories=await Promise.all(folders.map(async f=>{
    const mf=await LabAPI.readfile(`${f.path}/__meta.json`);
    let icon='📝',projectIds=[],metaSha=null;
    if(mf.content){try{const m=JSON.parse(mf.content);icon=m.icon||'📝';projectIds=m.projectIds||[];metaSha=mf.sha;}catch(e){}}
    return{name:f.name,path:f.path,icon,projectIds,metaSha};
  }));
  renderSidebar();
  if(categories.length>0)await selectCat(categories[0]);
  else document.getElementById('kb-main').innerHTML='<div class="no-cat-state"><div class="empty-icon">◈</div><div class="empty-title">Wähle eine Kategorie</div></div>';
}

// ── SIDEBAR ──
function renderSidebar(){
  const e=LabAPI.isOwner();
  document.getElementById('sidebar-stats').textContent=`${categories.length} Kategorien`;
  document.getElementById('cat-list').innerHTML=categories.map(cat=>`
    <li class="cat-item">
      <button class="cat-btn${activeCategory?.name===cat.name?' active':''}" onclick="selectCatByName('${cat.name}')">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${esc(cat.name)}</span>
      </button>
      ${e?`<div class="cat-actions">
        <button class="cat-action-btn edit" onclick="openEditCat('${cat.name}')">✎</button>
        <button class="cat-action-btn del" onclick="confirmDelCat('${cat.name}')">✕</button>
      </div>`:''}
    </li>`).join('');
}

async function selectCatByName(name){await selectCat(categories.find(c=>c.name===name));}

async function selectCat(cat){
  if(!cat)return;
  activeCategory=cat;
  renderSidebar();
  document.getElementById('kb-main').innerHTML='<div class="loading"><div class="spin"></div> Lade Notizen...</div>';
  const files=await LabAPI.listfiles(`Knowledge-Base/${cat.name}`);
  notes=await Promise.all(
    files.filter(f=>f.name!=='__meta.json'&&f.name!=='.gitkeep').map(async f=>{
      const file=await LabAPI.readfile(f.path);
      const{meta,content}=parseFM(file.content||'');
      return{filename:f.name,path:f.path,sha:file.sha,title:meta.title||fileToTitle(f.name),tags:Array.isArray(meta.tags)?meta.tags:(meta.tags?[meta.tags]:[]),date:meta.date||'',content};
    })
  );
  renderMain();
}

// ── MAIN ──
function renderMain(){
  const e=LabAPI.isOwner();
  document.getElementById('kb-main').innerHTML=`
    <div class="kb-main-header">
      <div class="kb-main-title"><span style="font-size:22px">${activeCategory.icon}</span>${esc(activeCategory.name)}</div>
      ${e?`<button class="btn btn-primary" onclick="openAddNote()">+ Notiz hinzufügen</button>`:''}
    </div>
    ${notes.length===0
      ?`<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">Noch keine Notizen</div></div>`
      :`<div class="notes-grid">${notes.map(n=>noteCard(n,e)).join('')}</div>`}`;
}

function noteCard(n,e){
  const tags=(n.tags||[]).map(t=>`<span class="note-tag">${esc(t)}</span>`).join('');
  const preview=n.content.replace(/[#*`>]/g,'').slice(0,120);
  return`<div class="note-card" onclick="viewNote('${n.path}')">
    ${e?`<div class="note-card-actions">
      <button class="note-action-btn edit" onclick="event.stopPropagation();editNote('${n.path}')">✎</button>
      <button class="note-action-btn del" onclick="event.stopPropagation();confirmDelNote('${n.path}')">✕</button>
    </div>`:''}
    <div class="note-card-title">${esc(n.title)}</div>
    <div class="note-card-preview">${esc(preview)}${n.content.length>120?'…':''}</div>
    <div class="note-card-footer"><div class="note-tags">${tags}</div><span class="note-date">${n.date||''}</span></div>
  </div>`;
}

// ── NOTE CRUD ──
function openAddNote(){
  editingNoteFile=null;
  document.getElementById('modal-note-title').textContent='Neue Notiz';
  ['note-title-input','note-tags-input','note-content-input'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-note');
  setTimeout(()=>document.getElementById('note-title-input').focus(),100);
}

function editNote(path){
  const n=notes.find(x=>x.path===path);if(!n)return;
  editingNoteFile={path:n.path,sha:n.sha};
  document.getElementById('modal-note-title').textContent='Notiz bearbeiten';
  document.getElementById('note-title-input').value=n.title;
  document.getElementById('note-tags-input').value=(n.tags||[]).join(', ');
  document.getElementById('note-content-input').value=n.content;
  closeModal('modal-view');openModal('modal-note');
  setTimeout(()=>document.getElementById('note-title-input').focus(),100);
}

async function saveNote(){
  const title=document.getElementById('note-title-input').value.trim();
  if(!title){document.getElementById('note-title-input').focus();return;}
  const tags=document.getElementById('note-tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
  const content=document.getElementById('note-content-input').value;
  const date=new Date().toISOString().split('T')[0];
  const filename=editingNoteFile?editingNoteFile.path.split('/').pop():titleToFile(title);
  const filePath=`${KB_BASE}/${activeCategory.name}/${filename}`;
  const md=serializeFM({title,tags,date},content);
  const btn=document.getElementById('note-save-btn');btn.textContent='Speichert...';btn.disabled=true;
  const res=await LabAPI.writefile(filePath,md,editingNoteFile?.sha||null);
  btn.textContent='Speichern';btn.disabled=false;
  if(!res){alert('Fehler beim Speichern');return;}
  closeModal('modal-note');await selectCat(activeCategory);
}

function viewNote(path){
  const n=notes.find(x=>x.path===path);if(!n)return;
  viewingNote=n;
  document.getElementById('view-title').textContent=n.title;
  document.getElementById('view-content').textContent=n.content;
  const eb=document.getElementById('view-edit-btn');if(eb)eb.style.display=LabAPI.isOwner()?'':'none';
  openModal('modal-view');
}

function editFromView(){if(viewingNote)editNote(viewingNote.path);}

function confirmDelNote(path){
  const n=notes.find(x=>x.path===path);if(!n)return;
  document.getElementById('confirm-title').textContent=`"${n.title}" löschen?`;
  document.getElementById('confirm-sub').textContent='Die .md Datei wird aus GitHub gelöscht — auch in Obsidian weg nach git pull.';
  pendingConfirm=async()=>{await LabAPI.deletefile(n.path,n.sha);await selectCat(activeCategory);};
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── CATEGORY CRUD ──
async function openAddCategory(){
  editingCatName=null;selectedIcon='📝';selectedProjectIds=[];
  document.getElementById('modal-cat-title').textContent='Neue Kategorie';
  document.getElementById('cat-name-input').value='';
  renderIconGrid();await renderProjPicker();
  openModal('modal-cat');setTimeout(()=>document.getElementById('cat-name-input').focus(),100);
}

async function openEditCat(name){
  editingCatName=name;const cat=categories.find(c=>c.name===name);
  selectedIcon=cat.icon;selectedProjectIds=[...(cat.projectIds||[])];
  document.getElementById('modal-cat-title').textContent='Kategorie bearbeiten';
  document.getElementById('cat-name-input').value=name;
  renderIconGrid();await renderProjPicker();openModal('modal-cat');
}

async function renderProjPicker(){
  const projects=await LabAPI.readProjects();
  const p=document.getElementById('cat-project-picker');
  if(!projects.length){p.innerHTML='<span style="font-size:11px;color:var(--text-dim)">Keine Projekte vorhanden.</span>';return;}
  p.innerHTML=projects.map(pr=>`<button class="proj-pill${selectedProjectIds.includes(pr.id)?' active':''}" onclick="toggleProj('${pr.id}')" id="pp-${pr.id}">${pr.icon} ${esc(pr.name)}</button>`).join('');
}

function toggleProj(id){
  if(selectedProjectIds.includes(id))selectedProjectIds=selectedProjectIds.filter(x=>x!==id);
  else selectedProjectIds.push(id);
  document.querySelectorAll('.proj-pill').forEach(el=>el.classList.remove('active'));
  selectedProjectIds.forEach(id=>{const el=document.getElementById(`pp-${id}`);if(el)el.classList.add('active');});
}

function renderIconGrid(){
  document.getElementById('icon-grid').innerHTML=ICONS.map(i=>`<div class="icon-opt${i===selectedIcon?' sel':''}" onclick="pickIcon('${i}')">${i}</div>`).join('');
}
function pickIcon(i){selectedIcon=i;renderIconGrid();}

async function saveCategory(){
  const name=document.getElementById('cat-name-input').value.trim();
  if(!name){document.getElementById('cat-name-input').focus();return;}
  const meta={icon:selectedIcon,projectIds:selectedProjectIds};
  const catPath=`${KB_BASE}/${name}`;const metaPath=`${catPath}/__meta.json`;
  const btn=document.getElementById('cat-save-btn');btn.textContent='Speichert...';btn.disabled=true;
  if(!editingCatName)await LabAPI.createfolder(catPath);
  const existingSha=editingCatName?categories.find(c=>c.name===editingCatName)?.metaSha:null;
  await LabAPI.writefile(metaPath,JSON.stringify(meta,null,2),existingSha);
  btn.textContent='Speichern';btn.disabled=false;
  closeModal('modal-cat');await initKB();
}

function confirmDelCat(name){
  document.getElementById('confirm-title').textContent=`"${name}" löschen?`;
  document.getElementById('confirm-sub').textContent='Der Ordner und alle Notizen werden aus GitHub gelöscht.';
  pendingConfirm=async()=>{
    await LabAPI.deletefolder(`${KB_BASE}/${name}`);
    if(activeCategory?.name===name){activeCategory=null;}
    await initKB();
  };
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingConfirm=null;}
document.getElementById('confirm-ok').onclick=()=>{if(pendingConfirm)pendingConfirm();closeConfirm();};
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open,.confirm-overlay.open').forEach(el=>el.classList.remove('open'));});

LabAPI.init(updateAuthUI);
initKB();
</script>
</body>
</html>
