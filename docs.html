<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs — lab.notes</title>
  <script>
    (function(){const s=localStorage.getItem('lab-theme');const sys=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',s||sys);})();
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root,[data-theme="dark"]{--bg:#07090a;--bg-raised:#0d1114;--bg-card:#101518;--border:#1c2830;--border-hi:#2a404e;--accent:#29e07f;--accent-dim:#1a6e43;--amber:#f0a843;--red:#e05a5a;--red-dim:#5a1a1a;--text:#dde8e2;--text-mid:#7a9e8e;--text-dim:#3a5548;--scan:rgba(0,255,120,0.015);--font-mono:'JetBrains Mono',monospace;--font-dis:'Syne',sans-serif;--font-body:'Inter',sans-serif;--shadow:0 8px 32px rgba(0,0,0,.5);--md-bg:var(--bg-card);--md-text:var(--text);--md-mid:var(--text-mid);--md-border:var(--border);--md-code-bg:#0a1a12}
    [data-theme="light"]{--bg:#f4f6f5;--bg-raised:#eaeeec;--bg-card:#ffffff;--border:#d0dbd5;--border-hi:#a8c4b8;--accent:#1a8f52;--accent-dim:#c8eedd;--amber:#c47a00;--red:#c0392b;--red-dim:#fde8e6;--text:#1a2620;--text-mid:#4a6a5a;--text-dim:#8aaa9a;--scan:transparent;--shadow:0 8px 32px rgba(0,0,0,.12);--md-bg:#ffffff;--md-text:#1a2620;--md-mid:#4a6a5a;--md-border:#d0dbd5;--md-code-bg:#f0f4f2}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.7;min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
    [data-theme="dark"] body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);pointer-events:none;z-index:100}
    [data-theme="dark"] body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}
    nav{position:sticky;top:0;z-index:50;background:rgba(7,9,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;transition:background .25s}
    [data-theme="light"] nav{background:rgba(244,246,245,.92)}
    .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
    .theme-toggle{width:44px;height:24px;border-radius:12px;background:var(--bg-raised);border:1px solid var(--border);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
    .theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--text-dim);transition:transform .2s,background .2s}
    [data-theme="light"] .theme-toggle::after{transform:translateX(20px);background:var(--accent)}
    .theme-toggle-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:10px;pointer-events:none}
    .theme-toggle-icon.moon{left:5px}.theme-toggle-icon.sun{right:4px}
    .nav-right{display:flex;align-items:center;gap:8px}
    /* markdown */
    .md-body{font-family:var(--font-body);font-size:14.5px;line-height:1.85;color:var(--md-text)}
    .md-body h1{font-family:var(--font-dis);font-size:24px;font-weight:800;color:var(--text);margin:0 0 20px;padding-bottom:12px;border-bottom:2px solid var(--border)}
    .md-body h2{font-family:var(--font-dis);font-size:19px;font-weight:700;color:var(--text);margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .md-body h3{font-family:var(--font-dis);font-size:15px;font-weight:700;color:var(--accent);margin:22px 0 8px}
    .md-body p{margin:0 0 14px;color:var(--md-mid)}
    .md-body strong{color:var(--md-text);font-weight:600}
    .md-body ul,.md-body ol{margin:0 0 14px 20px}
    .md-body li{margin-bottom:4px;color:var(--md-mid)}
    .md-body blockquote{border-left:3px solid var(--accent-dim);padding:10px 16px;background:rgba(41,224,127,.05);border-radius:0 6px 6px 0;margin:0 0 14px;color:var(--text-mid)}
    .md-body code{font-family:var(--font-mono);font-size:12.5px;background:var(--md-code-bg);border:1px solid var(--border);border-radius:3px;padding:1px 5px;color:var(--accent)}
    .md-body pre{background:var(--md-code-bg);border:1px solid var(--border);border-radius:6px;padding:16px;margin:0 0 14px;overflow-x:auto}
    .md-body pre code{background:none;border:none;padding:0;color:inherit;font-size:12.5px}
    .md-body table{width:100%;border-collapse:collapse;margin:0 0 14px;font-size:13px}
    .md-body th{background:var(--bg-raised);color:var(--text);padding:8px 12px;text-align:left;border:1px solid var(--border);font-weight:600}
    .md-body td{padding:8px 12px;border:1px solid var(--border);color:var(--md-mid)}
    .md-body hr{border:none;border-top:1px solid var(--border);margin:20px 0}
    .md-body img{max-width:100%;border-radius:6px;border:1px solid var(--border)}
    .md-body svg{max-width:100%;height:auto}
    .svg-block{margin:0 0 14px;padding:12px;background:var(--bg-raised);border:1px solid var(--border);border-radius:6px;overflow-x:auto}
    .wikilink{color:var(--accent);text-decoration:underline;cursor:pointer;font-style:italic}
    .wikilink:hover{opacity:.75}
    .svg-block svg{max-width:100%;height:auto;display:block;margin:0 auto}
    .img-upload-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--bg-raised);border:1px dashed var(--border);border-radius:5px}
    .img-upload-btn{font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s;white-space:nowrap}
    .img-upload-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
    .img-upload-status{font-size:11px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .img-upload-input{display:none}
    @media print{
      nav,footer,.modal-footer,.view-toggle,.filter-bar,.page-header{display:none!important}
      .modal-overlay{position:static!important;background:none!important;display:block!important;padding:0!important}
      .modal{box-shadow:none!important;border:none!important;max-width:100%!important;max-height:none!important}
      body::before,body::after{display:none!important}
      .md-body{font-size:12pt;color:#000!important}
    }
    .md-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
    .md-raw{font-family:var(--font-mono);font-size:12.5px;color:var(--text-mid);white-space:pre-wrap;line-height:1.75;background:var(--bg-raised);border-radius:6px;padding:16px}
    .view-toggle{display:flex;background:var(--bg-raised);border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
    .view-toggle-btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s}
    .view-toggle-btn.active{background:var(--accent-dim);color:var(--accent)}
    .nav-logo{font-family:var(--font-dis);font-weight:800;font-size:17px;letter-spacing:-.5px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:8px}
    .nav-logo span{color:var(--text-mid);font-weight:400;font-size:13px;font-family:var(--font-mono)}
    .nav-links{display:flex;gap:2px;list-style:none}
    .nav-links a{color:var(--text-mid);text-decoration:none;padding:6px 14px;border-radius:4px;font-size:12px;transition:color .2s,background .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(41,224,127,.07)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2.4s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .auth-btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s}
    .auth-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
    .auth-btn.logged-in{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .auth-user{font-size:11px;color:var(--text-mid);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .site-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px}
    .page-header{padding:48px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}
    .page-title{font-family:var(--font-dis);font-size:28px;font-weight:800;color:var(--text);letter-spacing:-1px}
    .page-title .hl{color:var(--accent)}
    .page-meta{font-size:12px;color:var(--text-dim);display:flex;gap:20px;flex-wrap:wrap}
    .page-meta span b{color:var(--text-mid)}

    /* FILTER BAR */
    .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;align-items:center}
    .filter-pill{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s}
    .filter-pill:hover{color:var(--text-mid);border-color:var(--border-hi)}
    .filter-pill.active{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .filter-pill.favs-pill{color:var(--amber);border-color:rgba(240,168,67,.3)}
    .filter-pill.favs-pill.active{background:rgba(240,168,67,.08);border-color:var(--amber)}
    .docs-search-wrap{margin-left:auto;position:relative}
    .docs-search-input{background:var(--bg-raised);border:1px solid var(--border);border-radius:5px;padding:6px 28px 6px 28px;font-family:var(--font-mono);font-size:11px;color:var(--text);outline:none;width:180px;transition:border-color .2s,width .2s}
    .docs-search-input:focus{border-color:var(--accent-dim);width:240px}
    .docs-search-input::placeholder{color:var(--text-dim)}
    .docs-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim);pointer-events:none}
    .docs-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;display:none}
    .docs-search-clear.visible{display:block}
    /* fav btn on doc card */
    .doc-fav-btn{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:2px;color:var(--text-dim);transition:color .15s}
    .doc-fav-btn:hover{color:var(--amber)}
    .doc-fav-btn.active{color:var(--amber)}

    /* DOCS LIST */
    .project-section{margin-bottom:40px}
    .project-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .project-section-title{font-family:var(--font-dis);font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
    .docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
    .doc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:16px 18px;cursor:pointer;transition:border-color .2s;position:relative}
    .doc-card:hover{border-color:var(--border-hi)}
    .doc-card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .doc-icon{font-size:20px;flex-shrink:0}
    .doc-title{font-family:var(--font-dis);font-size:14px;font-weight:700;color:var(--text)}
    .doc-version{font-size:10px;color:var(--accent);border:1px solid var(--accent-dim);border-radius:3px;padding:1px 6px;margin-left:auto;flex-shrink:0}
    .doc-preview{font-size:11px;color:var(--text-mid);line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .doc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
    .doc-tags{display:flex;gap:4px;flex-wrap:wrap}
    .doc-tag{font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:3px;padding:1px 6px}
    .doc-date{font-size:10px;color:var(--text-dim)}
    .doc-badge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
    .doc-badge.neu{background:rgba(41,224,127,.12);color:var(--accent);border:1px solid var(--accent-dim)}
    .doc-badge.update{background:rgba(240,168,67,.1);color:var(--amber);border:1px solid #6b4a18}
    .doc-card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
    .doc-card:hover .doc-card-actions{opacity:1}
    .doc-action-btn{width:22px;height:22px;border-radius:3px;background:var(--bg-raised);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .doc-action-btn.edit:hover{color:var(--amber)}
    .doc-action-btn.del:hover{color:var(--red)}

    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--text-dim);gap:12px}
    .empty-icon{font-size:32px;opacity:.3}
    .empty-title{font-family:var(--font-dis);font-size:15px;color:var(--text-mid)}
    .loading{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:12px;padding:40px 0}
    .spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:10px;width:100%;max-width:760px;max-height:92vh;overflow-y:auto;animation:mIn .2s ease;box-shadow:var(--shadow)}
    .modal.sm{max-width:480px}
    .modal.fullscreen{max-width:1100px;max-height:96vh}
    @keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-family:var(--font-dis);font-size:16px;font-weight:700;color:var(--text)}
    .modal-close{width:28px;height:28px;border-radius:4px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .modal-close:hover{color:var(--text);background:var(--bg-raised)}
    .modal-body{padding:24px}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
    .form-input{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:var(--font-mono);font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--accent-dim)}
    .form-select{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:var(--font-mono);font-size:13px;color:var(--text);outline:none;cursor:pointer}
    .form-textarea{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:12px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text);resize:vertical;min-height:320px;line-height:1.75;outline:none;transition:border-color .2s}
    .form-textarea:focus{border-color:var(--accent-dim)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px}
    .icon-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
    .icon-opt{width:32px;height:32px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .15s}
    .icon-opt:hover,.icon-opt.sel{border-color:var(--accent-dim);background:rgba(41,224,127,.08)}

    /* VERSION HISTORY */
    .versions-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
    .ver-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;font-size:12px}
    .ver-tag{color:var(--accent);font-weight:700;flex-shrink:0;min-width:40px}
    .ver-msg{color:var(--text-mid);flex:1}
    .ver-date{color:var(--text-dim);font-size:10px;flex-shrink:0}
    .ver-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:0 2px;transition:color .15s;flex-shrink:0}
    .ver-del:hover{color:var(--red)}

    /* DOC VIEW */
    .doc-view-content{font-size:13px;color:var(--text-mid);line-height:1.9;white-space:pre-wrap}
    .doc-view-meta{display:flex;gap:16px;flex-wrap:wrap;padding:12px 16px;background:var(--bg-raised);border-radius:4px;margin-bottom:16px;font-size:11px}
    .doc-view-meta-item{display:flex;flex-direction:column;gap:2px}
    .doc-view-meta-label{color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-size:10px}
    .doc-view-meta-value{color:var(--text-mid)}

    .btn{font-family:var(--font-mono);font-size:11px;padding:7px 14px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .2s;letter-spacing:.05em}
    .btn-primary{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .btn-primary:hover{background:rgba(41,224,127,.15)}
    .btn-ghost{color:var(--text-mid);border-color:var(--border);background:transparent}
    .btn-ghost:hover{color:var(--text);border-color:var(--border-hi)}
    .btn-danger{color:var(--red);border-color:var(--red-dim);background:transparent}
    .btn-danger:hover{background:rgba(224,90,90,.08)}
    .btn-sm{padding:4px 10px;font-size:10px}

    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center}
    .confirm-overlay.open{display:flex}
    .confirm-box{background:var(--bg-card);border:1px solid var(--red-dim);border-radius:8px;padding:28px;max-width:380px;width:90%;text-align:center}
    .confirm-icon{font-size:28px;margin-bottom:14px}
    .confirm-title{font-family:var(--font-dis);font-size:16px;color:var(--text);margin-bottom:8px}
    .confirm-sub{font-size:12px;color:var(--text-mid);margin-bottom:24px}
    .confirm-btns{display:flex;gap:8px;justify-content:center}
    footer{border-top:1px solid var(--border);padding:24px;display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);position:relative;z-index:1}
    .footer-sig{color:var(--accent)}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">lab.notes <span>/ EE Engineering</span></a>
    <ul class="nav-links">

const GH_RAW = 'https://raw.githubusercontent.com/frozenfocus-io/quartz/main/content/Attachments/';

// ══ MARKDOWN ══
function renderMarkdown(raw){
  if(typeof marked==='undefined')return`<pre class="md-raw">${raw.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre>`;
  const blocks=[];
  let p=raw
    .replace(/\$\$([^$]+?)\$\$/gs,(_,m)=>{blocks.push({t:'block',m});return`LATEXBLOCK${blocks.length-1}END`;})
    .replace(/\$([^$\n]+?)\$/g,(_,m)=>{blocks.push({t:'inline',m});return`LATEXINLINE${blocks.length-1}END`;})
    .replace(/!\[\[([^\]]+)\]\]/g,(_,fname)=>{
      const f=fname.trim();
      if(f.endsWith('.svg'))return`<img src="${GH_RAW}${encodeURIComponent(f)}" alt="${f}" style="max-width:100%;height:auto"/>`;
      return`<img src="${GH_RAW}${encodeURIComponent(f)}" alt="${f}" style="max-width:100%;border-radius:6px;border:1px solid var(--border)"/>`;
    })
    .replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(_,t,a)=>`<span class="wikilink" onclick="openWikilink('${t.replace(/'/g,"\\'")}')">${a||t}</span>`);
  marked.setOptions({breaks:true,gfm:true});
  const renderer=new marked.Renderer();
  const origCode=renderer.code.bind(renderer);
  renderer.code=function(code,lang){
    if(lang==='svg'){const safe=(typeof code==='object'?code.text:code).replace(/<script[\s\S]*?<\/script>/gi,'');return`<div class="svg-block">${safe}</div>`;}
    return origCode(code,lang);
  };
  let html=marked.parse(p,{renderer});
  html=html.replace(/LATEXBLOCK(\d+)END/g,(_,i)=>{try{return katex.renderToString(blocks[i].m,{displayMode:true,throwOnError:false});}catch(e){return`<code>${blocks[i].m}</code>`;}});
  html=html.replace(/LATEXINLINE(\d+)END/g,(_,i)=>{try{return katex.renderToString(blocks[i].m,{displayMode:false,throwOnError:false});}catch(e){return`<code>${blocks[i].m}</code>`;}});
  return html;
}

function openWikilink(target){
  const tl=target.toLowerCase();

    ||d.path.toLowerCase().includes(target.toLowerCase().replace(/\s+/g,'-')));
  if(found) viewDoc(found.path);
  else showToast(`"${target}" nicht gefunden`);
}
function showToast(msg){
  let t=document.getElementById('lab-toast');
  if(!t){t=document.createElement('div');t.id='lab-toast';
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);padding:8px 18px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .2s';
  document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.opacity='0',2500);
}

async function uploadImage(input,statusId,textareaId){
  const file=input.files[0];if(!file)return;
  const statusEl=document.getElementById(statusId);
  const textarea=document.getElementById(textareaId);
  statusEl.textContent=`Lade hoch: ${file.name}…`;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const b64=e.target.result.split(',')[1];
    const path=`content/Attachments/${file.name}`;
    const existing=await LabAPI.readfile(path);
    const res=await LabAPI.writefile(path,b64,existing.sha||null,true);
    if(res){
      const syntax=`![[${file.name}]]`;
      const pos=textarea.selectionStart;
      textarea.value=textarea.value.slice(0,pos)+syntax+textarea.value.slice(pos);
      textarea.selectionStart=textarea.selectionEnd=pos+syntax.length;
      textarea.focus();
      statusEl.textContent=`✓ ${file.name} hochgeladen`;
      setTimeout(()=>statusEl.textContent='Bild einfügen: ![[dateiname.png]]',3000);
    }else{statusEl.textContent='✗ Fehler beim Hochladen';}
  };
  reader.readAsDataURL(file);
  input.value='';
}

// ── LAB API ──
const LabAPI = (() => {
  let _user=null,_isOwner=false;
  async function init(cb){
    if(typeof netlifyIdentity==='undefined'){cb(null);return;}
    netlifyIdentity.on('login',async u=>{netlifyIdentity.close();_user=u;await _me();setTimeout(async()=>{await _me();cb(_user);},600);});
    netlifyIdentity.on('logout',()=>{_user=null;_isOwner=false;cb(null);});
    netlifyIdentity.on('init',async u=>{_user=u;if(u)await _me();cb(_user);});
    netlifyIdentity.init();
  }
  async function _me(){try{const r=await _r('/.netlify/functions/api?action=me');if(r.ok){const d=await r.json();_isOwner=d.isOwner;}}catch(e){}}
  function _r(url,opts={}){const t=_user?.token?.access_token;return fetch(url,{...opts,headers:{'Content-Type':'application/json',...(t?{'Authorization':`Bearer ${t}`}:{}),... (opts.headers||{})}});}
  async function list(p){const r=await _r(`/.netlify/functions/api?action=list&path=${encodeURIComponent(p)}`);return r.ok?(await r.json()).items:[];}
  async function listfiles(p){const r=await _r(`/.netlify/functions/api?action=listfiles&path=${encodeURIComponent(p)}`);return r.ok?(await r.json()).items:[];}
  async function readfile(p){const r=await _r(`/.netlify/functions/api?action=readfile&path=${encodeURIComponent(p)}`);return r.ok?await r.json():{content:null,sha:null};}
  async function writefile(p,content,sha,isBinary=false){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'writefile',path:p,content,sha,isBinary})});return r.ok?await r.json():false;}
  async function deletefile(p,sha){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'deletefile',path:p,sha})});return r.ok;}
  async function createfolder(p){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'createfolder',path:p})});return r.ok;}
  async function deletefolder(p){if(!_user){netlifyIdentity.open('login');return false;}const r=await _r('/.netlify/functions/api',{method:'POST',body:JSON.stringify({action:'deletefolder',path:p})});return r.ok;}
  async function readProjects(){try{const r=await _r('/.netlify/functions/api?key=projects');if(r.ok){const{data}=await r.json();if(data)return data;}}catch(e){}const c=localStorage.getItem('cache-projects')||localStorage.getItem('lab-projects');return c?JSON.parse(c):[];}
  function isOwner(){return _isOwner;}
  function getUser(){return _user;}
  function login(){netlifyIdentity.open('login');}
  function logout(){netlifyIdentity.logout();}
  return{init,list,listfiles,readfile,writefile,deletefile,createfolder,deletefolder,readProjects,isOwner,getUser,login,logout};
})();

// ── FRONTMATTER ──
// Docs are stored as:
// content/Docs/<ProjectId>/<filename>.md
// Frontmatter: title, version, date, tags, badge, icon
// Body: the content
// Versions stored as JSON block at end: <!-- versions: [...] -->

function parseFM(raw){
  if(!raw||!raw.startsWith('---'))return{meta:{},content:raw||''};
  const end=raw.indexOf('\n---',3);if(end===-1)return{meta:{},content:raw};
  const yaml=raw.slice(4,end);const body=raw.slice(end+4).trimStart();
  const meta={};
  yaml.split('\n').forEach(line=>{
    const c=line.indexOf(':');if(c===-1)return;
    const k=line.slice(0,c).trim();const v=line.slice(c+1).trim();
    if(v.startsWith('[')&&v.endsWith(']'))meta[k]=v.slice(1,-1).split(',').map(s=>s.trim()).filter(Boolean);
    else meta[k]=v;
  });
  // Extract versions from hidden comment block
  const verMatch=body.match(/<!-- versions: (.*?) -->/s);
  let versions=[];
  if(verMatch){try{versions=JSON.parse(verMatch[1]);}catch(e){}}
  const content=body.replace(/\n?<!-- versions: .*? -->/s,'').trim();
  return{meta,content,versions};
}

function serializeDoc(meta,content,versions){
  const lines=['---'];
  for(const[k,v]of Object.entries(meta)){
    if(Array.isArray(v))lines.push(`${k}: [${v.join(', ')}]`);
    else lines.push(`${k}: ${v}`);
  }
  lines.push('---','',content||'');
  if(versions&&versions.length){
    lines.push('','<!-- versions: '+JSON.stringify(versions)+' -->');
  }
  return lines.join('\n');
}

function titleToFile(t){return t.trim().replace(/[^\w\säöüÄÖÜß\-]/g,'').replace(/\s+/g,'-')+'.md';}

// ── INIT ──
async function initDocs(){
  projects=await LabAPI.readProjects();
  // Load docs: for each project folder in content/Docs/
  const folders=await LabAPI.list('Docs');
  allDocs=[];
  await Promise.all(folders.map(async f=>{
    const files=await LabAPI.listfiles(`Docs/${f.name}`);
    await Promise.all(files.filter(x=>x.name!=='.gitkeep').map(async file=>{
      const raw=await LabAPI.readfile(file.path);
      const{meta,content,versions}=parseFM(raw.content||'');
      allDocs.push({
        projectId:f.name,
        filename:file.name,
        path:file.path,
        sha:raw.sha,
        icon:meta.icon||'📐',
        title:meta.title||file.name.replace(/\.md$/,''),
        version:meta.version||'',
        date:meta.date||'',
        tags:Array.isArray(meta.tags)?meta.tags:(meta.tags?[meta.tags]:[]),
        badge:meta.badge||'',
        content,
        versions:versions||[]
      });
    }));
  }));
  renderPage();
}

function renderFilterBar(){

    <input class="docs-search-input" id="docs-search" placeholder="Docs durchsuchen..." oninput="onDocsSearch(this.value)" autocomplete="off" value="${esc(docsSearchQuery)}"/>
    <button class="docs-search-clear${docsSearchQuery?' visible':''}" id="docs-search-clear" onclick="clearDocsSearch()">✕</button>
  </div>`;
  bar.innerHTML=`<button class="filter-pill${activeFilter==='all'?' active':''}" onclick="setFilter('all')">Alle</button>`
    +`<button class="filter-pill favs-pill${activeFilter==='__favs__'?' active':''}" onclick="setFilter('__favs__')">⭐ Favoriten</button>`
    +projects.map(p=>`<button class="filter-pill${activeFilter===p.id?' active':''}" onclick="setFilter('${p.id}')">${p.icon} ${esc(p.name)}</button>`).join('')
    +searchHtml;

function setFilter(id){activeFilter=id;docsSearchQuery='';renderFilterBar();renderDocs();}

function renderDocs(){
  const container=document.getElementById('docs-content');
  const canEdit=LabAPI.isOwner();

  // search filter
  let docsToShow=allDocs;
  if(docsSearchQuery){
    const q=docsSearchQuery.toLowerCase();
    docsToShow=allDocs.filter(d=>d.title.toLowerCase().includes(q)||d.content.toLowerCase().includes(q)||(d.tags||[]).some(t=>t.toLowerCase().includes(q)));
  }

  if(activeFilter==='__favs__'){
    const favDocs=docsToShow.filter(d=>docFavPaths.has(d.path));
    if(favDocs.length===0){container.innerHTML='<div class="empty-state"><div class="empty-icon">☆</div><div class="empty-title">Noch keine Favoriten</div></div>';return;}
    container.innerHTML=`<div class="project-section"><div class="project-section-header"><div class="project-section-title">⭐ Favoriten</div></div><div class="docs-grid">${favDocs.map(d=>docCard(d,canEdit)).join('')}</div></div>`;
    return;
  }

  if(docsSearchQuery&&docsToShow.length===0){container.innerHTML='<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-title">Keine Treffer</div></div>';return;}

  const filteredProjects=activeFilter==='all'?projects:projects.filter(p=>p.id===activeFilter);
  if(!filteredProjects.length){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Keine Projekte vorhanden</div></div>';
    return;
  }
  container.innerHTML=filteredProjects.map(p=>{
    const docs=docsToShow.filter(d=>d.projectId===p.id);
    return`<div class="project-section">
      <div class="project-section-header">
        <div class="project-section-title">${p.icon} ${esc(p.name)}</div>
        ${canEdit?`<button class="btn btn-primary btn-sm" onclick="openAddDoc('${p.id}')">+ Dokument</button>`:''}
      </div>
      ${docs.length===0
        ?`<div style="color:var(--text-dim);font-size:12px;padding:12px 0">Noch keine Docs${canEdit?' — klick "+ Dokument"':''}</div>`
        :`<div class="docs-grid">${docs.map(d=>docCard(d,canEdit)).join('')}</div>`}
    </div>`;
  }).join('');
}

function docCard(d,canEdit){
  const tags=(d.tags||[]).map(t=>`<span class="doc-tag">${esc(t)}</span>`).join('');
  const badge=d.badge?`<span class="doc-badge ${d.badge}">${d.badge.toUpperCase()}</span>`:'';
  const preview=d.content.replace(/[#*`>]/g,'').slice(0,100);
  const isFav=docFavPaths.has(d.path);
  return`<div class="doc-card" onclick="viewDoc('${d.path}')">
    ${canEdit?`<div class="doc-card-actions">
      <button class="doc-action-btn edit" onclick="event.stopPropagation();editDoc('${d.path}')">✎</button>
      <button class="doc-action-btn del" onclick="event.stopPropagation();confirmDelDoc('${d.path}')">✕</button>
    </div>`:''}
    <div class="doc-card-top">
      <span class="doc-icon">${d.icon}</span>
      <span class="doc-title">${esc(d.title)}</span>
      ${d.version?`<span class="doc-version">${esc(d.version)}</span>`:''}
    </div>
    ${badge?`<div style="margin-bottom:6px">${badge}</div>`:''}
    <div class="doc-preview">${esc(preview)}${d.content.length>100?'…':''}</div>
    <div class="doc-footer">
      <div class="doc-tags">${tags}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="doc-date">${d.date||''}</span>
        <button class="doc-fav-btn${isFav?' active':''}" onclick="event.stopPropagation();toggleDocFav('${d.path}')">${isFav?'⭐':'☆'}</button>
      </div>
    </div>
  </div>`;
}

// ── DOC CRUD ──
function openAddDoc(projectId){
  editingDoc=null;selectedIcon='📐';
  document.getElementById('modal-doc-title').textContent='Neues Dokument';
  document.getElementById('doc-title-input').value='';
  document.getElementById('doc-version-input').value='v1.0';
  document.getElementById('doc-date-input').value=new Date().toLocaleDateString('de-DE',{month:'short',year:'numeric'});
  document.getElementById('doc-tags-input').value='';
  document.getElementById('doc-badge-input').value='neu';
  document.getElementById('doc-content-input').value='';
  document.getElementById('doc-save-btn').dataset.project=projectId;
  renderDocIconGrid();
  openModal('modal-doc');
  setTimeout(()=>document.getElementById('doc-title-input').focus(),100);
}

function editDoc(path){
  const d=allDocs.find(x=>x.path===path);if(!d)return;
  editingDoc=d;selectedIcon=d.icon||'📐';
  document.getElementById('modal-doc-title').textContent='Dokument bearbeiten';
  document.getElementById('doc-title-input').value=d.title;
  document.getElementById('doc-version-input').value=d.version||'';
  document.getElementById('doc-date-input').value=d.date||'';
  document.getElementById('doc-tags-input').value=(d.tags||[]).join(', ');
  document.getElementById('doc-badge-input').value=d.badge||'';
  document.getElementById('doc-content-input').value=d.content;
  renderDocIconGrid();
  closeModal('modal-view');
  openModal('modal-doc');
  setTimeout(()=>document.getElementById('doc-title-input').focus(),100);
}

function renderDocIconGrid(){
  document.getElementById('doc-icon-grid').innerHTML=DOC_ICONS.map(i=>`<div class="icon-opt${i===selectedIcon?' sel':''}" onclick="pickDocIcon('${i}')">${i}</div>`).join('');
}
function pickDocIcon(i){selectedIcon=i;renderDocIconGrid();}

async function saveDoc(){
  const title=document.getElementById('doc-title-input').value.trim();
  if(!title){document.getElementById('doc-title-input').focus();return;}
  const tags=document.getElementById('doc-tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
  const content=document.getElementById('doc-content-input').value;
  const version=document.getElementById('doc-version-input').value.trim();
  const date=document.getElementById('doc-date-input').value.trim();
  const badge=document.getElementById('doc-badge-input').value;

  const projectId=editingDoc?editingDoc.projectId:document.getElementById('doc-save-btn').dataset.project;
  const filename=editingDoc?editingDoc.filename:titleToFile(title);
  const filePath=`${DOCS_BASE}/${projectId}/${filename}`;

  // If new project folder, create it
  if(!editingDoc){
    const existing=allDocs.find(d=>d.projectId===projectId);
    if(!existing)await LabAPI.createfolder(`${DOCS_BASE}/${projectId}`);
  }

  // Keep existing versions, add new version entry if version changed
  let versions=editingDoc?[...(editingDoc.versions||[])]:[];
  if(editingDoc&&version&&version!==editingDoc.version){
    versions.unshift({tag:version,msg:'Update',date:new Date().toISOString().split('T')[0]});
  }

  const meta={icon:selectedIcon,title,version,date,tags,badge};
  const md=serializeDoc(meta,content,versions);

  const btn=document.getElementById('doc-save-btn');btn.textContent='Speichert...';btn.disabled=true;
  const res=await LabAPI.writefile(filePath,md,editingDoc?.sha||null);
  btn.textContent='Speichern';btn.disabled=false;

  if(!res){alert('Fehler beim Speichern');return;}
  closeModal('modal-doc');
  await initDocs();
}

let docViewMode='preview';
function setDocViewMode(mode){
  docViewMode=mode;
  document.getElementById('view-rendered').style.display=mode==='preview'?'':'none';
  document.getElementById('view-raw').style.display=mode==='raw'?'':'none';
  document.getElementById('doc-toggle-preview').classList.toggle('active',mode==='preview');
  document.getElementById('doc-toggle-raw').classList.toggle('active',mode==='raw');
}

function viewDoc(path){
  const d=allDocs.find(x=>x.path===path);if(!d)return;
  viewingDoc=d;
  trackRecent({type:'doc',path:d.path,title:d.title,icon:d.icon,cat:d.projectId,date:d.date});
  document.getElementById('view-title').textContent=`${d.icon} ${d.title}`;
  document.getElementById('view-meta').innerHTML=`
    ${d.version?`<div class="doc-view-meta-item"><span class="doc-view-meta-label">Version</span><span class="doc-view-meta-value" style="color:var(--accent)">${esc(d.version)}</span></div>`:''}
    ${d.date?`<div class="doc-view-meta-item"><span class="doc-view-meta-label">Datum</span><span class="doc-view-meta-value">${esc(d.date)}</span></div>`:''}
    ${d.tags&&d.tags.length?`<div class="doc-view-meta-item"><span class="doc-view-meta-label">Tags</span><span class="doc-view-meta-value">${d.tags.map(t=>esc(t)).join(', ')}</span></div>`:''}
  `;
  // Render markdown
  const renderedEl=document.getElementById('view-rendered');
  renderedEl.innerHTML=renderMarkdown(d.content);
  highlightCode(renderedEl);
  document.getElementById('view-raw').textContent=d.content;
  setDocViewMode('preview');
  // Versions
  const vd=document.getElementById('view-versions');
  if(d.versions&&d.versions.length){
    vd.innerHTML=`<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:8px">Versionshistorie</div>
      <div class="versions-list">${d.versions.map((v,i)=>`
        <div class="ver-item">
          <span class="ver-tag">${esc(v.tag)}</span>
          <span class="ver-msg">${esc(v.msg||'')}</span>
          <span class="ver-date">${v.date||''}</span>
          ${LabAPI.isOwner()?`<button class="ver-del" onclick="delVersion('${d.path}',${i})">✕</button>`:''}
        </div>`).join('')}
      </div></div>`;
  } else { vd.innerHTML=''; }
  const eb=document.getElementById('view-edit-btn');if(eb)eb.style.display=LabAPI.isOwner()?'':'none';
  openModal('modal-view');
}

function editFromView(){if(viewingDoc)editDoc(viewingDoc.path);}

async function delVersion(path,idx){
  const d=allDocs.find(x=>x.path===path);if(!d)return;
  const versions=[...(d.versions||[])];
  versions.splice(idx,1);
  const meta={icon:d.icon,title:d.title,version:d.version,date:d.date,tags:d.tags,badge:d.badge};
  const md=serializeDoc(meta,d.content,versions);
  await LabAPI.writefile(d.path,md,d.sha);
  await initDocs();
  closeModal('modal-view');
}

function confirmDelDoc(path){
  const d=allDocs.find(x=>x.path===path);if(!d)return;
  document.getElementById('confirm-title').textContent=`"${d.title}" löschen?`;
  document.getElementById('confirm-sub').textContent='Das .md-Dokument wird aus GitHub gelöscht — auch in Obsidian weg nach git pull.';
  pendingConfirm=async()=>{await LabAPI.deletefile(d.path,d.sha);await initDocs();};
  document.getElementById('confirm-overlay').classList.add('open');
}

// ══ FAVORITES ══
function toggleDocFav(path){
  if(docFavPaths.has(path))docFavPaths.delete(path);
  else docFavPaths.add(path);
  localStorage.setItem('lab-docs-favs',JSON.stringify([...docFavPaths]));
  renderDocs();
}

// ══ SEARCH ══
let docsSearchTimer=null;
function onDocsSearch(q){
  docsSearchQuery=q.trim();
  const clearBtn=document.getElementById('docs-search-clear');
  if(clearBtn)clearBtn.classList.toggle('visible',docsSearchQuery.length>0);
  clearTimeout(docsSearchTimer);
  docsSearchTimer=setTimeout(()=>{renderDocs();},250);
}
function clearDocsSearch(){
  docsSearchQuery='';
  const inp=document.getElementById('docs-search');if(inp)inp.value='';
  const clearBtn=document.getElementById('docs-search-clear');if(clearBtn)clearBtn.classList.remove('visible');
  renderDocs();
}

// ══ RECENTLY VIEWED ══
function trackRecent(item){
  let recent=JSON.parse(localStorage.getItem('lab-recently')||'[]');
  recent=recent.filter(r=>r.path!==item.path);
  recent.unshift({...item,viewedAt:new Date().toISOString()});
  recent=recent.slice(0,12);
  localStorage.setItem('lab-recently',JSON.stringify(recent));
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingConfirm=null;}
document.getElementById('confirm-ok').onclick=()=>{if(pendingConfirm)pendingConfirm();closeConfirm();};
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open,.confirm-overlay.open').forEach(el=>el.classList.remove('open'));});

let _docsInitDone=false;
function _maybeInitDocs(){if(!_docsInitDone){_docsInitDone=true;initDocs();}}

LabAPI.init(u=>{updateAuthUI(u);_maybeInitDocs();});
</script>
</body>
