<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs — lab.notes</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#07090a; --bg-raised:#0d1114; --bg-card:#101518;
      --border:#1c2830; --border-hi:#2a404e;
      --accent:#29e07f; --accent-dim:#1a6e43;
      --amber:#f0a843; --red:#e05a5a; --red-dim:#5a1a1a;
      --text:#dde8e2; --text-mid:#7a9e8e; --text-dim:#3a5548;
      --scan:rgba(0,255,120,0.015);
      --font-mono:'JetBrains Mono',monospace;
      --font-dis:'Syne',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.7;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);pointer-events:none;z-index:100}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}

    nav{position:sticky;top:0;z-index:50;background:rgba(7,9,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
    .nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
    .nav-logo{font-family:var(--font-dis);font-weight:800;font-size:17px;letter-spacing:-.5px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:8px}
    .nav-logo span{color:var(--text-mid);font-weight:400;font-size:13px;font-family:var(--font-mono)}
    .nav-links{display:flex;gap:2px;list-style:none}
    .nav-links a{color:var(--text-mid);text-decoration:none;padding:6px 14px;border-radius:4px;font-size:12px;letter-spacing:.05em;transition:color .2s,background .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent);background:rgba(41,224,127,.07)}
    .nav-status{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-dim)}
    .auth-btn{font-family:var(--font-mono);font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s}
    .auth-btn:hover{color:var(--accent);border-color:var(--accent-dim)}
    .auth-btn.logged-in{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .auth-user{font-size:11px;color:var(--text-mid);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .site-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px}

    .page-header{padding:48px 0 32px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:0}
    .breadcrumb{font-size:11px;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .breadcrumb a{color:var(--text-dim);text-decoration:none}
    .breadcrumb a:hover{color:var(--accent)}
    .page-title{font-family:var(--font-dis);font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text)}
    .page-sub{font-size:12px;color:var(--text-mid);margin-top:4px}

    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:40px;align-items:center}
    .filter-label{font-size:11px;color:var(--text-dim);margin-right:4px}
    .filter-btn{font-family:var(--font-mono);font-size:11px;color:var(--text-mid);background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 12px;cursor:pointer;transition:all .2s;letter-spacing:.05em}
    .filter-btn:hover,.filter-btn.active{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}

    .project-group{margin-bottom:56px}
    .group-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
    .group-tag{font-size:10px;letter-spacing:.12em;text-transform:uppercase;border-radius:3px;padding:2px 8px;border:1px solid}
    .group-tag.wip{color:var(--amber);background:rgba(240,168,67,.08);border-color:#6b4a18}
    .group-tag.planned{color:var(--text-mid);background:transparent;border-color:var(--border)}
    .group-tag.done{color:var(--accent);background:rgba(41,224,127,.08);border-color:var(--accent-dim)}
    .group-title{font-family:var(--font-dis);font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
    .group-line{flex:1;height:1px;background:var(--border)}
    .group-count{font-size:11px;color:var(--text-dim);white-space:nowrap}
    .group-add-btn{font-family:var(--font-mono);font-size:11px;color:var(--accent);background:rgba(41,224,127,.07);border:1px solid var(--accent-dim);border-radius:4px;padding:4px 12px;cursor:pointer;transition:all .2s;white-space:nowrap}
    .group-add-btn:hover{background:rgba(41,224,127,.15)}

    .doc-entry{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
    .doc-entry:hover{border-color:var(--border-hi)}
    .doc-entry.open{border-color:var(--border-hi)}

    .doc-main{display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;padding:20px 24px;cursor:pointer}
    .doc-icon{width:38px;height:38px;border-radius:5px;background:var(--bg-raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .doc-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
    .doc-title{font-family:var(--font-dis);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
    .doc-version{font-size:10px;color:var(--text-mid);border:1px solid var(--border);border-radius:3px;padding:1px 7px;flex-shrink:0}
    .doc-badge{font-size:10px;padding:1px 7px;border-radius:3px;border:1px solid;flex-shrink:0}
    .badge-new{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .badge-upd{color:var(--amber);border-color:#6b4a18;background:rgba(240,168,67,.07)}
    .doc-meta-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
    .doc-chips{display:flex;gap:5px}
    .chip{font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:3px;padding:1px 6px}
    .doc-date{font-size:11px;color:var(--text-dim)}
    .doc-actions{display:flex;align-items:center;gap:6px}
    .doc-action-btn{width:28px;height:28px;border-radius:4px;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text-dim);transition:all .2s}
    .doc-action-btn:hover{border-color:var(--border-hi);color:var(--text)}
    .doc-action-btn.edit:hover{color:var(--amber);border-color:#6b4a18}
    .doc-action-btn.del:hover{color:var(--red);border-color:var(--red-dim)}
    .btn-chevron{width:28px;height:28px;border-radius:4px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text-dim);transition:all .2s}
    .doc-entry.open .btn-chevron{transform:rotate(180deg);color:var(--accent)}

    .doc-expanded{display:none;border-top:1px solid var(--border)}
    .doc-entry.open .doc-expanded{display:block}
    .doc-expanded-inner{display:grid;grid-template-columns:1fr 1fr;gap:0}
    @media(max-width:700px){.doc-expanded-inner{grid-template-columns:1fr}}

    .preview-pane{padding:24px;border-right:1px solid var(--border)}
    .info-pane{padding:24px}
    .pane-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}

    .preview-placeholder{background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px;flex-direction:column;gap:8px}
    .preview-placeholder .pi{font-size:28px;opacity:.3}

    .notes-block{background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:16px;font-size:12px;color:var(--text-mid);line-height:1.8;margin-bottom:20px;white-space:pre-wrap}

    .version-list{display:grid;gap:8px}
    .version-item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;padding:10px 12px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border)}
    .version-tag{font-size:11px;color:var(--accent);font-weight:500;margin-top:1px;white-space:nowrap}
    .version-msg{font-size:11px;color:var(--text-mid)}
    .version-msg small{display:block;color:var(--text-dim);font-size:10px;margin-top:2px}
    .version-del{font-size:11px;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:3px;padding:2px 8px;cursor:pointer;transition:all .2s;font-family:var(--font-mono)}
    .version-del:hover{color:var(--red);border-color:var(--red-dim)}

    .add-version-btn{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:transparent;border:1px dashed var(--border);border-radius:4px;padding:7px 12px;cursor:pointer;transition:all .2s;width:100%;text-align:left;margin-top:8px}
    .add-version-btn:hover{color:var(--accent);border-color:var(--accent-dim)}

    .empty-state{text-align:center;padding:60px 24px;color:var(--text-dim);border:1px dashed var(--border);border-radius:6px}
    .empty-icon{font-size:28px;margin-bottom:12px;opacity:.4}
    .empty-text{font-size:12px}

    .no-projects{text-align:center;padding:80px 24px;color:var(--text-dim)}
    .no-projects-icon{font-size:32px;margin-bottom:16px;opacity:.3}
    .no-projects-title{font-family:var(--font-dis);font-size:16px;color:var(--text-mid);margin-bottom:8px}
    .no-projects-sub{font-size:12px;margin-bottom:24px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:8px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:mIn .2s ease}
    @keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-family:var(--font-dis);font-size:16px;font-weight:700;color:var(--text)}
    .modal-close{width:28px;height:28px;border-radius:4px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .modal-close:hover{color:var(--text);background:var(--bg-raised)}
    .modal-body{padding:24px}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
    .form-input{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:var(--font-mono);font-size:13px;color:var(--text);transition:border-color .2s;outline:none}
    .form-input:focus{border-color:var(--accent-dim)}
    .form-textarea{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:12px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text);resize:vertical;min-height:120px;line-height:1.7;transition:border-color .2s;outline:none}
    .form-textarea:focus{border-color:var(--accent-dim)}
    .form-select{width:100%;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;padding:10px 14px;font-family:var(--font-mono);font-size:13px;color:var(--text);outline:none;cursor:pointer}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-hint{font-size:11px;color:var(--text-dim);margin-top:6px}

    .btn{font-family:var(--font-mono);font-size:11px;padding:7px 14px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .2s;letter-spacing:.05em}
    .btn-primary{color:var(--accent);border-color:var(--accent-dim);background:rgba(41,224,127,.07)}
    .btn-primary:hover{background:rgba(41,224,127,.15)}
    .btn-ghost{color:var(--text-mid);border-color:var(--border);background:transparent}
    .btn-ghost:hover{color:var(--text);border-color:var(--border-hi)}
    .btn-danger{color:var(--red);border-color:var(--red-dim);background:transparent}
    .btn-danger:hover{background:rgba(224,90,90,.08)}

    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center}
    .confirm-overlay.open{display:flex}
    .confirm-box{background:var(--bg-card);border:1px solid var(--red-dim);border-radius:8px;padding:28px;max-width:380px;width:90%;text-align:center}
    .confirm-icon{font-size:28px;margin-bottom:14px}
    .confirm-title{font-family:var(--font-dis);font-size:16px;color:var(--text);margin-bottom:8px}
    .confirm-sub{font-size:12px;color:var(--text-mid);margin-bottom:24px}
    .confirm-btns{display:flex;gap:8px;justify-content:center}

    /* icon picker */
    .icon-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
    .icon-opt{width:32px;height:32px;border-radius:4px;background:var(--bg-raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .15s}
    .icon-opt:hover,.icon-opt.sel{border-color:var(--accent-dim);background:rgba(41,224,127,.08)}

    footer{border-top:1px solid var(--border);padding:32px 24px;margin-top:60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--text-dim);max-width:1100px;margin-left:auto;margin-right:auto;position:relative;z-index:1}
    .footer-sig{color:var(--accent)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">lab.notes <span>/ EE Engineering</span></a>
    <ul class="nav-links">
      <li><a href="index.html#projekte">Projekte</a></li>
      <li><a href="docs.html" class="active">Docs</a></li>
      <li><a href="kb.html">Knowledge Base</a></li>
    </ul>
    <div class="nav-status"><div class="status-dot"></div>aktiv</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="auth-user" id="auth-user-display"></span>
      <button class="auth-btn" id="auth-btn" onclick="authAction()">Login</button>
    </div>
  </div>
</nav>

<div class="site-wrap">
  <div class="page-header">
    <div>
      <div class="breadcrumb"><a href="index.html">lab.notes</a><span>/</span><span>Docs</span></div>
      <h1 class="page-title">Schaltpläne & Docs</h1>
      <p class="page-sub">Projektdokumentation · Schaltpläne · BOMs · Simulationsergebnisse</p>
    </div>
    <div id="header-stats" style="font-size:11px;color:var(--text-dim);"></div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <span class="filter-label">Projekt:</span>
    <button class="filter-btn active" onclick="filterDocs('all',this)">Alle</button>
  </div>

  <div id="docs-content"></div>
</div>

<footer>
  <span>lab.notes — Persönliches Engineering-Journal</span>
  <span class="footer-sig">built by hand · 2026</span>
</footer>

<!-- DOC MODAL -->
<div class="modal-overlay" id="modal-doc">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-doc-title">Neues Dokument</span>
      <button class="modal-close" onclick="closeModal('modal-doc')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Icon</label>
        <div class="icon-grid" id="doc-icon-grid"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Titel</label>
          <input class="form-input" id="doc-title" placeholder="z.B. Topologie-Analyse"/>
        </div>
        <div class="form-group">
          <label class="form-label">Version</label>
          <input class="form-input" id="doc-version" placeholder="z.B. v1.0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Datum</label>
          <input class="form-input" id="doc-date" placeholder="z.B. 08 Mär 2026"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="doc-badge">
            <option value="new">NEU</option>
            <option value="upd">UPDATE</option>
            <option value="">Kein Badge</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (kommagetrennt)</label>
        <input class="form-input" id="doc-tags" placeholder="z.B. Schaltplan, Gate-Driver"/>
      </div>
      <div class="form-group">
        <label class="form-label">Notizen</label>
        <textarea class="form-textarea" id="doc-notes" placeholder="Beschreibung, offene Punkte, Änderungen..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-doc')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveDoc()">Speichern</button>
    </div>
  </div>
</div>

<!-- VERSION MODAL -->
<div class="modal-overlay" id="modal-version">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">Version hinzufügen</span>
      <button class="modal-close" onclick="closeModal('modal-version')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Version</label>
          <input class="form-input" id="ver-tag" placeholder="z.B. v1.1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Datum</label>
          <input class="form-input" id="ver-date" placeholder="z.B. 10 Mär 2026"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Beschreibung</label>
        <input class="form-input" id="ver-msg" placeholder="z.B. Bootstrap-C erhöht"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-version')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveVersion()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">⚠</div>
    <div class="confirm-title" id="confirm-title">Sicher?</div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Abbrechen</button>
      <button class="btn btn-danger" id="confirm-ok">Löschen</button>
    </div>
  </div>
</div>

<script>
const DOC_ICONS = ['📐','⚡','🔌','📊','🛠️','📝','🔬','📦','🗂️','💾','🖥️','📡','🔧','⚙️','🧪','💡','📋','🗃️','📌','🔍'];

// ── LAB API ──
const LabAPI = (() => {
  let _user = null, _isOwner = false, _perms = {};
  async function init(onAuthChange) {
    if (typeof netlifyIdentity === 'undefined') { onAuthChange(null); return; }
    netlifyIdentity.on('login', async u => { netlifyIdentity.close(); _user = u; await _fetchMe(); onAuthChange(_user); });
    netlifyIdentity.on('logout', () => { _user = null; _isOwner = false; _perms = {}; onAuthChange(null); });
    netlifyIdentity.on('init', async u => { _user = u; if (u) await _fetchMe(); onAuthChange(_user); });
    netlifyIdentity.init();
  }
  async function _fetchMe() {
    try { const r = await _apiFetch('/api?action=me'); if (r.ok) { const d = await r.json(); _isOwner = d.isOwner; _perms = d.permissions||{}; } } catch(e) {}
  }
  function _apiFetch(url, opts={}) {
    const token = _user?.token?.access_token;
    return fetch(url, { ...opts, headers: { 'Content-Type':'application/json', ...(token?{'Authorization':`Bearer ${token}`}:{}), ...(opts.headers||{}) }});
  }
  async function read(key, def=null) {
    try {
      const r = await _apiFetch(`/api?key=${key}`);
      if (r.ok) { const {data} = await r.json(); if (data !== null) { localStorage.setItem('cache-'+key, JSON.stringify(data)); return data; } }
    } catch(e) {}
    const cached = localStorage.getItem('cache-'+key);
    if (cached) return JSON.parse(cached);
    const legacyMap = {'projects':'lab-projects','kb':'kb-data','docs':'docs-data'};
    const legacy = legacyMap[key] ? localStorage.getItem(legacyMap[key]) : null;
    if (legacy) return JSON.parse(legacy);
    return def;
  }
  async function write(key, d, projectId) {
    if (!_user) { netlifyIdentity.open('login'); return false; }
    localStorage.setItem('cache-'+key, JSON.stringify(d));
    try {
      const r = await _apiFetch('/api', { method:'POST', body: JSON.stringify({key, data:d, projectId}) });
      return r.ok;
    } catch(e) { return false; }
  }
  function canEdit(projectId) {
    if (!_user) return false; if (_isOwner) return true;
    const p = _perms[projectId]||_perms['*']; return p==='rw';
  }
  function isOwner() { return _isOwner; }
  function getUser() { return _user; }
  function login() { netlifyIdentity.open('login'); }
  function logout() { netlifyIdentity.logout(); }
  return { init, read, write, canEdit, isOwner, getUser, login, logout };
})();

function authAction() { if (LabAPI.getUser()) LabAPI.logout(); else LabAPI.login(); }

function updateAuthUI(user) {
  const btn = document.getElementById('auth-btn');
  const disp = document.getElementById('auth-user-display');
  if (user) { btn.textContent='Logout'; btn.className='auth-btn logged-in'; disp.textContent=user.email; }
  else { btn.textContent='Login'; btn.className='auth-btn'; disp.textContent=''; }
  render();
}

async function loadProjects() { return await LabAPI.read('projects', []); }
async function loadDocs()     { return await LabAPI.read('docs', { entries: [] }); }
async function saveDocs(d)    { await LabAPI.write('docs', d); }

let activeFilter = 'all';
let editingDocId = null;
let editingProjectId = null;
let selIcon = '📐';
let pendingConfirm = null;
let versionDocId = null;

// ── RENDER ──
async function render() {
  const projects = await loadProjects();
  const docs = await loadDocs();
  renderFilterBar(projects);
  renderContent(projects, docs);
  renderStats(docs);
}

function renderStats(docs) {
  const total = (docs.entries||[]).length;
  document.getElementById('header-stats').textContent = `${total} Dokument${total!==1?'e':''}`;
}

function renderFilterBar(projects) {
  const bar = document.getElementById('filter-bar');
  let html = `<span class="filter-label">Projekt:</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="filterDocs('all',this)">Alle</button>`;
  projects.forEach(p => {
    html += `<button class="filter-btn ${activeFilter===p.id?'active':''}" onclick="filterDocs('${p.id}',this)">${p.icon} ${esc(p.name)}</button>`;
  });
  bar.innerHTML = html;
}

function renderContent(projects, docs) {
  const content = document.getElementById('docs-content');

  if (!projects.length) {
    content.innerHTML = `<div class="no-projects">
      <div class="no-projects-icon">📂</div>
      <div class="no-projects-title">Noch keine Projekte</div>
      <div class="no-projects-sub">Erstelle zuerst ein Projekt auf der Homepage.</div>
      <a href="index.html" style="font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid var(--accent-dim);background:rgba(41,224,127,.07);border-radius:4px;padding:7px 14px;text-decoration:none;">→ Zur Homepage</a>
    </div>`;
    return;
  }

  const visibleProjects = activeFilter === 'all' ? projects : projects.filter(p => p.id === activeFilter);
  let html = '';

  visibleProjects.forEach(p => {
    const entries = (docs.entries||[]).filter(e => e.projectId === p.id);
    html += `
      <div class="project-group" data-project="${p.id}">
        <div class="group-header">
          <span class="group-tag ${p.status}">${statusLabel(p.status)}</span>
          <span class="group-title">${p.icon} ${esc(p.name)}</span>
          <div class="group-line"></div>
          <span class="group-count">${entries.length} Dokument${entries.length!==1?'e':''}</span>
          <button class="group-add-btn" onclick="openAddDoc('${p.id}')">+ Dokument</button>
        </div>
        ${entries.length === 0
          ? `<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-text">Noch keine Dokumente für dieses Projekt</div></div>`
          : entries.map(e => renderDocEntry(e)).join('')
        }
      </div>`;
  });

  content.innerHTML = html;
}

function statusLabel(s) { return s==='wip'?'⚡ In Arbeit':s==='done'?'✓ Fertig':'○ Geplant'; }

function renderDocEntry(e) {
  const tags = (e.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('');
  const badge = e.badge==='new'
    ? `<span class="doc-badge badge-new">NEU</span>`
    : e.badge==='upd'
    ? `<span class="doc-badge badge-upd">UPDATE</span>` : '';
  const versions = (e.versions||[]);

  return `
    <div class="doc-entry" id="doc-${e.id}">
      <div class="doc-main" onclick="toggleDoc('doc-${e.id}')">
        <div class="doc-icon">${e.icon||'📄'}</div>
        <div class="doc-info">
          <div class="doc-top">
            <span class="doc-title">${esc(e.title)}</span>
            <span class="doc-version">${esc(e.version||'')}</span>
            ${badge}
          </div>
          <div class="doc-meta-row">
            <div class="doc-chips">${tags}</div>
            <span class="doc-date">${esc(e.date||'')}</span>
          </div>
        </div>
        <div class="doc-actions" onclick="event.stopPropagation()">
          <button class="doc-action-btn edit" title="Bearbeiten" onclick="openEditDoc('${e.id}')">✎</button>
          <button class="doc-action-btn del" title="Löschen" onclick="confirmDelDoc('${e.id}')">✕</button>
          <button class="btn-chevron">▾</button>
        </div>
      </div>
      <div class="doc-expanded">
        <div class="doc-expanded-inner">
          <div class="preview-pane">
            <div class="pane-label">Vorschau</div>
            <div class="preview-placeholder">
              <span class="pi">${e.icon||'📄'}</span>
              <span>Bild hier einfügen</span>
            </div>
            <p style="font-size:11px;color:var(--text-dim);margin-top:10px;text-align:center;">${esc(e.title)}</p>
          </div>
          <div class="info-pane">
            <div class="pane-label">Notizen</div>
            <div class="notes-block">${esc(e.notes||'Noch keine Notizen.')}</div>
            <div class="pane-label">Versionshistorie</div>
            <div class="version-list" id="vlist-${e.id}">
              ${versions.length === 0
                ? `<div style="font-size:11px;color:var(--text-dim);">Noch keine Versionen eingetragen.</div>`
                : versions.map((v,i) => `
                  <div class="version-item">
                    <span class="version-tag">${esc(v.tag)}</span>
                    <div class="version-msg">${esc(v.msg)}<small>${esc(v.date||'')}</small></div>
                    <button class="version-del" onclick="delVersion('${e.id}',${i})">✕</button>
                  </div>`).join('')
              }
            </div>
            <button class="add-version-btn" onclick="openAddVersion('${e.id}')">+ Version hinzufügen</button>
          </div>
        </div>
      </div>
    </div>`;
}

// ── FILTER ──
function filterDocs(projectId, btn) {
  activeFilter = projectId;
  render();
}

// ── TOGGLE ──
function toggleDoc(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── DOC CRUD ──
function openAddDoc(projectId) {
  editingDocId = null;
  editingProjectId = projectId;
  selIcon = '📐';
  document.getElementById('modal-doc-title').textContent = 'Neues Dokument';
  ['doc-title','doc-version','doc-date','doc-tags','doc-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('doc-badge').value = 'new';
  renderDocIconGrid();
  openModal('modal-doc');
  setTimeout(()=>document.getElementById('doc-title').focus(),100);
}

async function openEditDoc(id) {
  editingDocId = id;
  const docs = await loadDocs();
  const e = (docs.entries||[]).find(x=>x.id===id);
  if(!e) return;
  editingProjectId = e.projectId;
  selIcon = e.icon || '📐';
  document.getElementById('modal-doc-title').textContent = 'Dokument bearbeiten';
  document.getElementById('doc-title').value = e.title||'';
  document.getElementById('doc-version').value = e.version||'';
  document.getElementById('doc-date').value = e.date||'';
  document.getElementById('doc-tags').value = (e.tags||[]).join(', ');
  document.getElementById('doc-notes').value = e.notes||'';
  document.getElementById('doc-badge').value = e.badge||'';
  renderDocIconGrid();
  openModal('modal-doc');
}

function renderDocIconGrid() {
  document.getElementById('doc-icon-grid').innerHTML = DOC_ICONS.map(i=>
    `<div class="icon-opt${i===selIcon?' sel':''}" onclick="pickDocIcon('${i}')">${i}</div>`
  ).join('');
}

function pickDocIcon(i) { selIcon=i; renderDocIconGrid(); }

async function saveDoc() {
  const title = document.getElementById('doc-title').value.trim();
  if(!title){document.getElementById('doc-title').focus();return;}
  const docs = await loadDocs();
  const entry = {
    id: editingDocId || ('doc-'+Date.now()),
    projectId: editingProjectId,
    icon: selIcon,
    title,
    version: document.getElementById('doc-version').value.trim(),
    date: document.getElementById('doc-date').value.trim(),
    tags: document.getElementById('doc-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    notes: document.getElementById('doc-notes').value.trim(),
    badge: document.getElementById('doc-badge').value,
    versions: editingDocId ? ((docs.entries||[]).find(x=>x.id===editingDocId)||{}).versions||[] : []
  };
  if(editingDocId){
    const idx=(docs.entries||[]).findIndex(x=>x.id===editingDocId);
    docs.entries[idx]=entry;
  } else {
    if(!docs.entries) docs.entries=[];
    docs.entries.push(entry);
  }
  await saveDocs(docs);
  closeModal('modal-doc');
  render();
}

async function confirmDelDoc(id) {
  const docs = await loadDocs();
  const e = (docs.entries||[]).find(x=>x.id===id);
  document.getElementById('confirm-title').textContent = `"${e.title}" löschen?`;
  document.getElementById('confirm-sub').textContent = 'Dieses Dokument wird unwiderruflich entfernt.';
  pendingConfirm = async () => {
    docs.entries = (docs.entries||[]).filter(x=>x.id!==id);
    await saveDocs(docs);
    render();
  };
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── VERSIONS ──
function openAddVersion(docId) {
  versionDocId = docId;
  document.getElementById('ver-tag').value='';
  document.getElementById('ver-msg').value='';
  document.getElementById('ver-date').value='';
  openModal('modal-version');
  setTimeout(()=>document.getElementById('ver-tag').focus(),100);
}

async function saveVersion() {
  const tag = document.getElementById('ver-tag').value.trim();
  const msg = document.getElementById('ver-msg').value.trim();
  if(!tag){document.getElementById('ver-tag').focus();return;}
  const docs = await loadDocs();
  const e = (docs.entries||[]).find(x=>x.id===versionDocId);
  if(!e) return;
  if(!e.versions) e.versions=[];
  e.versions.unshift({ tag, msg, date: document.getElementById('ver-date').value.trim() });
  await saveDocs(docs);
  closeModal('modal-version');
  render();
}

async function delVersion(docId, idx) {
  const docs = await loadDocs();
  const e = (docs.entries||[]).find(x=>x.id===docId);
  if(!e||!e.versions) return;
  e.versions.splice(idx,1);
  await saveDocs(docs);
  render();
}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingConfirm=null;}

document.getElementById('confirm-ok').onclick=()=>{if(pendingConfirm)pendingConfirm();closeConfirm();};
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open,.confirm-overlay.open').forEach(el=>el.classList.remove('open'));});

LabAPI.init(updateAuthUI);
render();
</script>
